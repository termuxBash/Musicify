<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🎧 Songify Pro Mobile</title>
<style>
:root {
    --spotify-green: #1db954;
    --bg-dark: #0f0c29;
    --panel-bg: #121212;
    --danger-red: #d32f2f;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
    font-family: 'Poppins', -apple-system, sans-serif;
    background: var(--bg-dark);
    color: white;
    overflow-x: hidden;
    height: 100vh;
    transition: opacity 0.3s ease;
}

/* --- Navigation --- */
nav {
    position: fixed; top: 0; width: 100%; height: 60px;
    background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
    display: flex; align-items: center; padding: 0 20px;
    z-index: 1000; border-bottom: 1px solid #333;
}
.menu-toggle { font-size: 24px; cursor: pointer; margin-right: 15px; color: var(--spotify-green); }
.system-monitor {
    margin-left: auto; font-family: monospace; font-size: 0.8rem;
    background: rgba(29, 185, 84, 0.1); padding: 5px 10px; border-radius: 15px;
}

/* --- Side Panel --- */
.side-panel {
    position: fixed; top: 0; left: -100%; width: 300px; height: 100%;
    background: var(--panel-bg); z-index: 2000;
    transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5);
    display: flex; flex-direction: column;
}
.side-panel.open { left: 0; }

.overlay {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.7); z-index: 1500; display: none;
}
/* 🛠️ FIXED: Changed from 'block;' to 'display: block;' so clicking outside triggers toggleMenu() */
.overlay.show { display: block; }

.queue-list { flex: 1; overflow-y: auto; margin-top: 20px; }
.queue-item {
    display: flex; align-items: center; gap: 10px;
    background: #1a1a1a; padding: 10px; border-radius: 8px; margin-bottom: 10px;
}
.queue-item img { width: 40px; border-radius: 4px; }
.queue-item p { font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.queue-item span {
    margin-left: auto; cursor: pointer; color: var(--danger-red); font-size: 30px;
}
/* --- Main Content --- */
.main-content { padding: 80px 20px 140px; width: 100%; max-width: 1200px; margin: 0 auto; }
.search-form { display: flex; gap: 8px; margin-bottom: 30px; align-items: center; }
.search-form input { 
    flex: 1; padding: 12px 20px; border-radius: 25px; border: 1px solid #444;
    background: #1a1a1a; color: white; outline: none;
}
.search-form button { 
    background: var(--spotify-green); border: none; padding: 12px 20px; 
    border-radius: 25px; font-weight: bold; cursor: pointer;
}
.auto-pick-btn {
    background: linear-gradient(135deg, #ffd166, #ff8c42);
    color: #111;
    min-width: 48px;
    box-shadow: 0 8px 20px rgba(255, 140, 66, 0.25);
}
.auto-pick-btn:disabled {
    opacity: 0.7;
    cursor: wait;
}
.results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

.song-card { background: #1a1a1a; padding: 10px; border-radius: 12px; text-align: center; }
.song-card img { width: 100%; border-radius: 8px; aspect-ratio: 1; object-fit: cover; }
.song-card p { font-size: 0.8rem; margin: 10px 0; height: 32px; overflow: hidden; }

/* --- Queue Button --- */
.add-btn {
    width: 100%; background: #333; color: white; border: none; padding: 8px;
    border-radius: 15px; font-weight: bold; cursor: pointer; transition: background 0.25s;
}
.add-btn.queued { background: var(--spotify-green); }
.card-actions {
    display: flex;
    gap: 8px;
    margin-top: 8px;
}
.card-actions .add-btn,
.card-actions .playlist-btn {
    width: auto;
    flex: 1;
}
.queue-playlist-controls {
    display: flex;
    gap: 8px;
    margin-top: 14px;
    margin-bottom: 6px;
}
.queue-playlist-select {
    flex: 1;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    min-width: 0;
}
.queue-playlist-btn {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 10px 12px;
    cursor: pointer;
    font-weight: bold;
    white-space: nowrap;
}
.playlist-btn {
    background: linear-gradient(135deg, #3b82f6, #8b5cf6);
    color: white;
    border: none;
    padding: 8px;
    border-radius: 15px;
    font-weight: bold;
    cursor: pointer;
}
.playlist-btn:hover {
    filter: brightness(1.08);
}

.playlist-modal {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.72);
    z-index: 2500;
    padding: 20px;
}
.playlist-modal.open { display: flex; }
.playlist-modal-card {
    width: min(92vw, 360px);
    background: #111;
    border: 1px solid #2f2f2f;
    border-radius: 18px;
    padding: 18px;
    box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
}
.playlist-modal-card h4 {
    margin-bottom: 8px;
}
.playlist-modal-card p {
    color: #aaa;
    font-size: 0.8rem;
    margin-bottom: 12px;
}
.playlist-select {
    width: 100%;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 12px;
}
.playlist-digits {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 12px;
}
.playlist-digit-btn {
    border: 1px solid #333;
    border-radius: 12px;
    background: #1a1a1a;
    color: white;
    padding: 10px;
    font-weight: bold;
    cursor: pointer;
}
.playlist-digit-btn.active {
    background: rgba(29, 185, 84, 0.2);
    border-color: var(--spotify-green);
    color: var(--spotify-green);
}
.playlist-combo-input {
    width: 100%;
    background: #1a1a1a;
    color: white;
    border: 1px solid #333;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 12px;
}
.playlist-modal-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
}
.playlist-modal-actions button {
    border: none;
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: bold;
}
.playlist-cancel {
    background: #333;
    color: white;
}
.playlist-save {
    background: linear-gradient(135deg, #ffd166, #ff8c42);
    color: #111;
}

/* --- Player Bar --- */
.player-bar {
    position: fixed; bottom: 0; left: 0; width: 100%; height: 110px;
    background: #000; border-top: 2px solid var(--spotify-green);
    display: flex; flex-direction: column; justify-content: center;
    padding: 10px 15px; z-index: 1000;
}
.player-top { display: flex; align-items: center; justify-content: space-between; width: 100%; margin-bottom: 8px; }
.now-playing { display: flex; align-items: center; gap: 10px; flex: 1; overflow: hidden; }
.now-playing img { width: 45px; height: 45px; border-radius: 6px; background: #222; }
.now-playing-info h4 { font-size: 0.8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.now-playing-info p { font-size: 0.65rem; color: var(--spotify-green); }

.player-bottom { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 10px; }
.volume-cluster { display: flex; align-items: center; gap: 8px; background: #111; padding: 5px 10px; border-radius: 20px; }
.vol-btn { background: #333; border: none; color: white; width: 28px; height: 28px; border-radius: 50%; cursor: pointer; }
#vol-slider { accent-color: var(--spotify-green); width: 80px; cursor: pointer; }
#vol-val { font-family: monospace; font-size: 0.75rem; min-width: 35px; text-align: center; }
.btn-group { display: flex; gap: 8px; }
.skip-btn { background: var(--spotify-green); border: none; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }
.power-btn { background: var(--danger-red); border: none; color: white; padding: 8px 15px; border-radius: 20px; font-weight: bold; font-size: 0.75rem; }

@media (min-width: 1024px) {
    .side-panel { 
        left: -100%; 
        width: 350px; 
    }
    .main-content { 
        margin-left: 0; 
        width: 100%; 
    }
    .menu-toggle { display: flex; } 
    .player-bar { flex-direction: row; height: 90px; }
    #vol-slider { width: 150px; }
}

.switch {
  position: relative;
  display: inline-block;
  width: 44px;
  height: 24px;
}

.switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0; right: 0; bottom: 0;
  background-color: #444;
  transition: .3s;
  border-radius: 24px;
}

.slider:before {
  position: absolute;
  content: "";
  height: 18px;
  width: 18px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  transition: .3s;
  border-radius: 50%;
}

input:checked + .slider {
  background-color: var(--spotify-green);
}

input:checked + .slider:before {
  transform: translateX(20px);
}
</style>
<link rel="stylesheet" href="{{ url_for('static', filename='common.css') }}">
</head>
<body>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<nav>
    <div class="menu-toggle" onclick="toggleMenu()">☰</div>
    <h3 style="color: var(--spotify-green)">Songify Pro</h3>
    
    <div style="display:flex;align-items:center;gap:15px;margin-left:15px;">
        <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:#aaa;">Lyrics</span>
            <label class="switch">
                <input type="checkbox" id="lyricsToggle" onchange="toggleLyrics()">
                <span class="slider"></span>
            </label>
        </div>

        <div style="display:flex;align-items:center;gap:6px;">
            <span style="font-size:12px;color:#aaa;">Autoplay</span>
            <label class="switch">
                <input type="checkbox" id="autoplayToggle" onchange="toggleAutoplay()">
                <span class="slider"></span>
            </label>
        </div>
    </div>
    
    <div class="system-monitor">CPU: <span id="cpu-load">0%</span></div>
</nav>

<div class="side-panel" id="sidePanel">
    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h3>Music Queue</h3>
        <span onclick="toggleMenu()" style="cursor: pointer; font-size: 24px;">✕</span>
    </div>
    <div class="queue-playlist-controls">

    <select
        id="playlistQueueSelect"
        class="queue-playlist-select"
        onclick="refreshPlaylistDropdown()">

        <option value="">
            Select Playlist
        </option>

    </select>

    <button
        class="queue-playlist-btn"
        onclick="enqueueSelectedPlaylist()">

        Queue

    </button>

</div>
    <div class="queue-list" id="queueList">
        <p style="color: #666; text-align: center; margin-top: 40px;">No songs queued.</p>
    </div>
</div>

<div class="main-content">
    <form class="search-form" id="searchForm">
        <input type="text" name="query" placeholder="Search YouTube Music..." required>
        <button type="submit">🔍</button>
        <button type="button" class="auto-pick-btn" id="autoPickBtn" title="Auto-pick and queue">✨️</button>
    </form>
    <div class="results-grid" id="results"></div>
</div>

<div class="player-bar">
    <div id="live-lyrics" style="font-size: 0.85rem; color: #1db954; font-weight: bold; margin-top: 4px; min-height: 1.2em;"></div>
    <div class="player-top">
        <div class="now-playing">
            <img id="playing-thumb" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50' y='65' text-anchor='middle' font-size='60' font-family='sans-serif'%3E🔊️%3C/text%3E%3C/svg%3E" alt="">
            <div class="now-playing-info">
                <p id="playing-status">IDLE</p>
                <h4 id="playing-title">Ready to stream</h4>
                </div>
        </div>
        <div class="btn-group">
            <button class="skip-btn" onclick="skipTrack()">SKIP ⏭</button>
            <button class="power-btn" onclick="sendControl('bose_power')">POWER ⏻</button>
        </div>
    </div>

    <div class="player-bottom">
        <div class="volume-cluster">
            <button class="vol-btn" onclick="sendControl('vol_down')">-</button>
            <input type="range" id="vol-slider" min="0" max="100" value="0" oninput="setVolume(this.value)">
            <button class="vol-btn" onclick="sendControl('vol_up')">+</button>
            <span id="vol-val">0%</span>
        </div>
        <div style="font-size: 10px; color: #555;">SYSTEM CONTROL</div>
    </div>
</div>

<div class="playlist-modal" id="playlistModal" onclick="if(event.target === this) closePlaylistMenu()">
    <div class="playlist-modal-card">
        <h4>Add to Playlist</h4>
        <p id="playlistSongTitle">Enter any combination of digits 1 through 6.</p>
        <div class="playlist-digits">
            <button type="button" class="playlist-digit-btn" data-digit="1" onclick="togglePlaylistDigit('1')">1</button>
            <button type="button" class="playlist-digit-btn" data-digit="2" onclick="togglePlaylistDigit('2')">2</button>
            <button type="button" class="playlist-digit-btn" data-digit="3" onclick="togglePlaylistDigit('3')">3</button>
            <button type="button" class="playlist-digit-btn" data-digit="4" onclick="togglePlaylistDigit('4')">4</button>
            <button type="button" class="playlist-digit-btn" data-digit="5" onclick="togglePlaylistDigit('5')">5</button>
            <button type="button" class="playlist-digit-btn" data-digit="6" onclick="togglePlaylistDigit('6')">6</button>
        </div>
        <input class="playlist-combo-input" id="playlistComboInput" type="text" inputmode="numeric" maxlength="6" placeholder="e.g. 13 or 246" oninput="syncPlaylistComboInput()">
        <div class="playlist-modal-actions">
            <button class="playlist-cancel" type="button" onclick="closePlaylistMenu()">Cancel</button>
            <button class="playlist-save" type="button" id="playlistSaveBtn" onclick="confirmPlaylistAdd()">Add</button>
        </div>
    </div>
</div>

<script>
    // 1. Setup Blueprint-specific properties globally
    window.API_PREFIX = "{{ api_prefix }}";
    window.CURRENT_OWNER = "youtube"; // for queue logic handling
</script>
<script src="{{ url_for('static', filename='common.js') }}"></script>
<script>
    // 3. Keep ONLY unique logic here (like your distinct layout toggle or search actions)
    function toggleMenu(){
        const panel = document.getElementById("sidePanel");
        const overlay = document.getElementById("overlay");
        const main = document.getElementById("main");
        panel.classList.toggle("open");
        overlay.classList.toggle("show");
        if(window.innerWidth >= 768 && main){
            main.classList.toggle("shift");
        }
    }
    
    document.addEventListener("DOMContentLoaded", refreshPlaylistDropdown);
</script>
<script>
const API_PREFIX = "{{ api_prefix }}";

const resultsGrid = document.getElementById("results");
const volSlider = document.getElementById("vol-slider");
const volVal = document.getElementById("vol-val");

function toggleMenu() {
    const panel = document.getElementById("sidePanel");
    const overlay = document.getElementById("overlay");
    panel.classList.toggle("open");
    overlay.classList.toggle("show");
}


/* SEARCH */
document.getElementById("searchForm").onsubmit = async (e)=>{
    e.preventDefault();
    resultsGrid.innerHTML = "Searching...";
    const res = await fetch(API_PREFIX+"/search",{method:"POST",body:new FormData(e.target)});
    const songs = await res.json();
    resultsGrid.innerHTML = songs.map(s=>`
        <div class="song-card">
            <img src="${s.thumbnail}">
            <p>${s.title}</p>
            <div class="card-actions">
                <button class="add-btn" onclick='addToQueue(${JSON.stringify(s)}, this)'>+QUEUE</button>
                <button class="playlist-btn" type="button" onclick='openPlaylistMenu(${JSON.stringify(s)}, this)' title="Add to playlist">🎶️</button>
            </div>
        </div>
    `).join("");
}

async function autoPickSong(btn){
    const form = document.getElementById("searchForm");
    const queryInput = form.querySelector("input[name='query']");
    const query = queryInput.value.trim();

    if(!query){
        queryInput.focus();
        return;
    }

    const previousLabel = btn.textContent;
    btn.disabled = true;
    btn.textContent = "⌛";

    try{
        let res = await fetch(API_PREFIX+"/auto_pick", {
            method: "POST",
            body: new FormData(form)
        });

        if(res.status === 403){
            const data = await res.json();
            if(data.owner === "local" || data.owner === "playlist"){
                const takeOver = confirm(
                    data.owner + " player is currently controlling playback.\n\n" +
                    "Taking ownership will clear its queue and stop playback.\n\n" +
                    "Continue?"
                );

                if(!takeOver){
                    return;
                }

                const acquire = await fetch(API_PREFIX + "/acquire", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ force: true })
                });

                if(!acquire.ok){
                    showPopup("Failed to acquire ownership.");
                    return;
                }

                res = await fetch(API_PREFIX+"/auto_pick", {
                    method: "POST",
                    body: new FormData(form)
                });

                if(!res.ok){
                    const retryData = await res.json();
                    showPopup(retryData.error || "Auto-pick failed after takeover.");
                    return;
                }
            } else {
                showPopup(`Playback is controlled by '${data.owner}'.`);
                return;
            }
        }

        const data = await res.json();

        if(!res.ok){
            showPopup(data.error || "Auto-pick failed.");
            return;
        }

        resultsGrid.innerHTML = `
            <div class="song-card">
                <img src="${data.song.thumbnail}">
                <p>${data.song.title}</p>
                <button class="add-btn queued" disabled>QUEUED</button>
            </div>
        `;
    } finally {
        btn.disabled = false;
        btn.textContent = previousLabel;
    }
}

document.getElementById("autoPickBtn").onclick = async (e)=>{
    await autoPickSong(e.target);
}

/* ADD TO QUEUE */
async function addToQueue(song, btn){
    btn.classList.add("queued");
    setTimeout(() => {
        btn.classList.remove("queued");
    }, 1500);

    let res = await fetch(API_PREFIX + "/enqueue", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(song)
    });

    if (res.ok) {
        return;
    }

    if (res.status === 403) {
        const data = await res.json();
        if (data.owner === "local" || data.owner === "playlist") {
            const takeOver = confirm(
                data.owner + " player is currently controlling playback.\n\n" +
                "Taking ownership will clear its queue and stop playback.\n\n" +
                "Continue?"
            );

            if (!takeOver) {
                return;
            }

            const acquire = await fetch(
                API_PREFIX + "/acquire",
                {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        force: true
                    })
                }
            );

            if (!acquire.ok) {
                showPopup("Failed to acquire ownership.");
                return;
            }

            res = await fetch(API_PREFIX + "/enqueue", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(song)
            });

            if (!res.ok) {
                showPopup("Failed to queue song after takeover.");
            }
            return;
        }
        showPopup(`Playback is controlled by '${data.owner}'.`);
    }
}

const playlistState = {
    song: null,
    button: null
};

document.addEventListener(
    "DOMContentLoaded",
    refreshPlaylistDropdown
);

/* UPDATE STATS */
async function updateStats(){
    try{
        const res = await fetch("/stats");
        const data = await res.json();
        document.getElementById("cpu-load").textContent = data.cpu + "%";

        if(document.activeElement !== volSlider){
            volSlider.value = data.volume;
            volVal.textContent = data.volume + "%";
        }

        if(data.now_playing){
    document.getElementById("playing-title").textContent = data.now_playing.title;
    document.getElementById("playing-thumb").src = data.now_playing.thumbnail;
    document.getElementById("playing-status").textContent = data.is_playing ? "BROADCASTING" : "PAUSED";
    // Inject the active sub-line safely
    document.getElementById("live-lyrics").textContent = data.current_lyric || "";
} else {
    document.getElementById("live-lyrics").textContent = "No lyrics available";
}

        const qList = document.getElementById("queueList");
        if(!data.queue || data.queue.length===0){
            qList.innerHTML = "No songs queued";
        } else {
            qList.innerHTML = data.queue.map((s,i)=>`
                <div class="queue-item">
                    <img src="${s.thumbnail}">
                    <p>${s.title}</p>
                    <span onclick="removeFromQueue(${i})">✕</span>
                </div>
            `).join("");
        }
        document.getElementById("lyricsToggle").checked = data.show_lyrics;
        document.getElementById("autoplayToggle").checked = data.autoplay_enabled;
    } catch(e){}
}

async function toggleLyrics(){
    const isChecked = document.getElementById("lyricsToggle").checked;
    await fetch("/toggle_lyrics", {
        method: "POST"
    });
}
/* 🛠️ FIXED: Removed Blueprint prefix overlap. Requests go straight to /stats/toggle_autoplay */
async function toggleAutoplay(){
    const isChecked = document.getElementById("autoplayToggle").checked;
    await fetch("/toggle_autoplay", {
        method: "POST"
    });
}
</script>
</body>
